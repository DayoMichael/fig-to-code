# Railway config for the API service.
# Settings → Config-as-code → /apps/api/railway.toml

[build]
buildCommand = "pnpm build:api"

[deploy]
startCommand = "pnpm start:api"
healthcheckPath = "/health"
healthcheckTimeout = 30
# The in-process watchdog kills a hung API; ON_FAILURE makes Railway restart it.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
